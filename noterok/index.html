<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.ibb.co/4wzJ2vTq/image.png">
    <title>NoteRok</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Login Screen */
        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.8em;
            letter-spacing: 1px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-input {
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #555;
        }

        .login-btn {
            padding: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #444;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Editor Screen */
        .editor-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .editor-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 18px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: #555;
            background: #222;
            color: #999;
        }

        .btn-icon:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Content */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
        }

        .editor-textarea {
            flex: 1;
            width: 100%;
            padding: 30px;
            background: #0a0a0a;
            color: #e0e0e0;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: background 0.2s;
        }

        .editor-textarea:focus {
            outline: none;
            background: #0f0f0f;
        }

        .editor-textarea::placeholder {
            color: #333;
        }

        .editor-textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 98;
        }

        .modal-overlay.show {
            display: block;
        }

        /* Modal */
        .notes-modal {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: #1a1a1a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            z-index: 99;
        }

        .notes-modal.show {
            right: 0;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #fff;
            font-size: 16px;
        }

        .close-modal-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: #999;
        }

        /* Notes List */
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item:hover {
            border-color: #555;
            background: #111;
        }

        .note-item.active {
            border-color: #666;
            background: #222;
        }

        .note-item-content {
            flex: 1;
            overflow: hidden;
        }

        .note-item-title {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item.active .note-item-title {
            color: #fff;
        }

        .note-delete-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .note-delete-btn:hover {
            color: #ff6b6b;
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }

        .modal-footer {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .modal-footer-btn {
            flex: 1;
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-footer-btn:hover {
            background: #444;
            border-color: #666;
        }

        .modal-footer-btn.logout {
            background: #1a2a3a;
            border-color: #2a3a4a;
        }

        .modal-footer-btn.logout:hover {
            background: #1a3a4a;
        }

        .user-info {
            padding: 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .user-info strong {
            color: #999;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createClient } = supabase;

        const supabaseUrl = 'https://zgohawnfwbhyuubgzhit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnb2hhd25md2JoeXV1Ymd6aGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2NjExNTQsImV4cCI6MjA4MzIzNzE1NH0.3AF50DVfjnXhlx_chrPFeVXtnhRvFPhreZFq30y1mSY';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const NoteRok = () => {
            const [username, setUsername] = useState('');
            const [inputUsername, setInputUsername] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [notes, setNotes] = useState([]);
            const [currentNoteId, setCurrentNoteId] = useState(null);
            const [noteContent, setNoteContent] = useState('');
            const [modalOpen, setModalOpen] = useState(false);
            const textareaRef = useRef(null);

            const getLocalNotesKey = (user) => `noterok_notes_${user}`;
            const getDeletedIdsKey = (user) => `noterok_deleted_${user}`;
            const getLocalSessionKey = () => 'noterok_user';

            const sortNotesByCreatedAt = (noteList) => {
                return [...noteList].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            };

            const normalizeTitle = (title) => {
                return title.trim().replace(/\s+/g, ' ');
            };

            const getTitleFromContent = (content, fallbackTitle) => {
                const text = (content || '').trim();
                if (!text) return fallbackTitle || 'Nota';

                const firstLine = text.split('\n')[0].trim();
                const words = firstLine.split(/\s+/).filter(Boolean);
                if (words.length <= 3) {
                    return firstLine;
                }
                return words.slice(0, 3).join(' ');
            };

            const buildVersionedTitle = (title, existingTitles) => {
                const normalized = normalizeTitle(title).replace(/\s*\(v\d+\)$/i, '');
                let version = 2;
                const exists = (candidate) => existingTitles.some(t => normalizeTitle(t).toLowerCase() === normalizeTitle(candidate).toLowerCase());
                while (exists(`${normalized} (v${version})`)) {
                    version += 1;
                }
                return `${normalized} (v${version})`;
            };

            const saveNotesToLocal = (user, noteList) => {
                if (!user) return;
                localStorage.setItem(getLocalNotesKey(user), JSON.stringify(noteList));
            };

            const loadNotesFromLocal = (user) => {
                if (!user) return [];
                const raw = localStorage.getItem(getLocalNotesKey(user));
                if (!raw) return [];
                try {
                    return JSON.parse(raw);
                } catch (err) {
                    console.error('Error parseando notas locales:', err);
                    return [];
                }
            };

            const saveDeletedIds = (user, deletedIds) => {
                if (!user) return;
                localStorage.setItem(getDeletedIdsKey(user), JSON.stringify(deletedIds));
            };

            const loadDeletedIds = (user) => {
                if (!user) return [];
                const raw = localStorage.getItem(getDeletedIdsKey(user));
                if (!raw) return [];
                try {
                    return JSON.parse(raw);
                } catch (err) {
                    console.error('Error parseando eliminaciones locales:', err);
                    return [];
                }
            };

            const updateLocalNotes = (user, updatedNotes) => {
                setNotes(updatedNotes);
                saveNotesToLocal(user, updatedNotes);
            };

            const syncPendingChanges = async (user, currentNotes) => {
                if (!navigator.onLine || !user) return;

                const notesToSync = currentNotes.filter(note => note.needsSync);
                const deletedIds = loadDeletedIds(user);
                const updatedNotes = [...currentNotes];

                for (const note of notesToSync) {
                    try {
                        const localIndex = updatedNotes.findIndex(n => n.id === note.id);
                        if (note.isNew) {
                            const { data, error } = await supabaseClient
                                .from('notes')
                                .insert({
                                    id: note.id,
                                    user_id: user,
                                    title: note.title,
                                    content: note.content,
                                    created_at: note.created_at || new Date().toISOString(),
                                    updated_at: note.updated_at
                                })
                                .select()
                                .single();

                            if (error) throw error;
                            updatedNotes[localIndex] = {
                                ...note,
                                isNew: false,
                                needsSync: false,
                                server_updated_at: data.updated_at
                            };
                        } else {
                            const { data: serverNote, error: fetchError } = await supabaseClient
                                .from('notes')
                                .select('id, title, content, updated_at')
                                .eq('id', note.id)
                                .eq('user_id', user)
                                .single();

                            if (fetchError && fetchError.code !== 'PGRST116') {
                                throw fetchError;
                            }

                            const serverUpdatedAt = serverNote?.updated_at;
                            const hasConflict = serverUpdatedAt && note.server_updated_at && new Date(serverUpdatedAt) > new Date(note.server_updated_at);

                            if (serverNote && hasConflict) {
                                const existingTitles = updatedNotes.map(n => n.title);
                                const versionedTitle = buildVersionedTitle(note.title, existingTitles);
                                const newNoteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}-${Math.random().toString(16).slice(2)}`;
                                const { data, error } = await supabaseClient
                                    .from('notes')
                                    .insert({
                                        id: newNoteId,
                                        user_id: user,
                                        title: versionedTitle,
                                        content: note.content,
                                        created_at: new Date().toISOString(),
                                        updated_at: note.updated_at
                                    })
                                    .select()
                                    .single();

                                if (error) throw error;

                                updatedNotes[localIndex] = {
                                    ...note,
                                    id: data.id,
                                    title: data.title,
                                    isNew: false,
                                    needsSync: false,
                                    server_updated_at: data.updated_at
                                };
                                if (currentNoteId === note.id) {
                                    setCurrentNoteId(data.id);
                                }
                            } else {
                                const { error } = await supabaseClient
                                    .from('notes')
                                    .update({
                                        title: note.title,
                                        content: note.content,
                                        updated_at: note.updated_at
                                    })
                                    .eq('id', note.id)
                                    .eq('user_id', user);

                                if (error) throw error;
                                updatedNotes[localIndex] = {
                                    ...note,
                                    needsSync: false,
                                    server_updated_at: note.updated_at
                                };
                            }
                        }
                    } catch (err) {
                        console.error('Error sincronizando nota:', note.id, err);
                    }
                }

                if (deletedIds.length > 0) {
                    const syncedIds = [];
                    for (const id of deletedIds) {
                        try {
                            const { error } = await supabaseClient
                                .from('notes')
                                .delete()
                                .eq('id', id)
                                .eq('user_id', user);

                            if (error) throw error;
                            syncedIds.push(id);
                        } catch (err) {
                            console.error('Error sincronizando eliminación:', id, err);
                        }
                    }
                    const remainingDeleted = deletedIds.filter(id => !syncedIds.includes(id));
                    saveDeletedIds(user, remainingDeleted);
                }

                const cleanedNotes = updatedNotes.filter(note => !note._deleted);
                cleanedNotes.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                updateLocalNotes(user, cleanedNotes);
            };

            const markNoteChanged = (noteId, newContent) => {
                const updatedNotes = notes.map(note => {
                    if (note.id !== noteId) return note;
                    return {
                        ...note,
                        content: newContent,
                        title: getTitleFromContent(newContent, note.title),
                        updated_at: new Date().toISOString(),
                        needsSync: true
                    };
                });
                updateLocalNotes(username, updatedNotes);
                if (navigator.onLine) syncPendingChanges(username, updatedNotes);
            };

            const addLocalNote = (newNote) => {
                const updatedNotes = [newNote, ...notes];
                updateLocalNotes(username, updatedNotes);
                if (navigator.onLine) syncPendingChanges(username, updatedNotes);
                return updatedNotes;
            };

            const removeLocalNote = (noteId) => {
                const updatedNotes = notes.filter(note => note.id !== noteId);
                const deletedIds = loadDeletedIds(username);
                const newDeletedIds = deletedIds.includes(noteId) ? deletedIds : [...deletedIds, noteId];
                saveDeletedIds(username, newDeletedIds);
                updateLocalNotes(username, updatedNotes);
                if (navigator.onLine) syncPendingChanges(username, updatedNotes);
                return updatedNotes;
            };

            // Login
            const handleLogin = async () => {
                const user = inputUsername.trim().toLowerCase();
                
                if (!user) {
                    setLoginError('Por favor ingresa un usuario');
                    return;
                }

                try {
                    setIsLoading(true);
                    
                    const { data: userData, error: userError } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', user)
                        .single();

                    if (userError) {
                        if (userError.code === 'PGRST116') {
                            setLoginError('Usuario no encontrado');
                        } else {
                            throw userError;
                        }
                        setIsLoading(false);
                        return;
                    }

                    if (!userData || !userData.is_active) {
                        setLoginError('Usuario no autorizado o inactivo');
                        setIsLoading(false);
                        return;
                    }

                    localStorage.setItem('noterok_user', user);
                    setUsername(user);
                    setLoginError('');
                    setInputUsername('');
                    
                    await loadNotes(user);
                    
                } catch (err) {
                    console.error('Error en login:', err);
                    setLoginError('Error: ' + err.message);
                    setIsLoading(false);
                }
            };

            // Cargar notas
            const loadNotes = async (user) => {
                try {
                    const localNotes = sortNotesByCreatedAt(loadNotesFromLocal(user));

                    if (!navigator.onLine) {
                        setNotes(localNotes);
                        if (localNotes.length > 0) {
                            setCurrentNoteId(localNotes[0].id);
                            setNoteContent(localNotes[0].content);
                            setTimeout(() => textareaRef.current?.focus(), 100);
                        }
                        return;
                    }

                    const { data, error } = await supabaseClient
                        .from('notes')
                        .select('id, title, content, created_at, updated_at')
                        .eq('user_id', user)
                        .order('created_at', { ascending: false });

                    if (error) {
                        throw error;
                    }

                    const serverNotes = (data || []).map(note => ({
                        ...note,
                        needsSync: false,
                        isNew: false
                    }));

                    const notesToUse = serverNotes.length > 0 ? serverNotes : localNotes;
                    setNotes(notesToUse);

                    if (notesToUse.length > 0) {
                        setCurrentNoteId(notesToUse[0].id);
                        setNoteContent(notesToUse[0].content);
                        setTimeout(() => textareaRef.current?.focus(), 100);
                    }

                    saveNotesToLocal(user, notesToUse);
                } catch (err) {
                    console.error('Error cargando notas:', err);
                    const localNotes = sortNotesByCreatedAt(loadNotesFromLocal(user));
                    if (localNotes.length > 0) {
                        setNotes(localNotes);
                        setCurrentNoteId(localNotes[0].id);
                        setNoteContent(localNotes[0].content);
                        setTimeout(() => textareaRef.current?.focus(), 100);
                    } else {
                        setNotes([]);
                        setCurrentNoteId(null);
                        setNoteContent('');
                    }
                    setLoginError('Modo offline: usando notas locales');
                } finally {
                    setIsLoading(false);
                }
            };

            // Seleccionar nota
            const selectNote = (noteId) => {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    setCurrentNoteId(noteId);
                    setNoteContent(note.content);
                    setModalOpen(false);
                    setTimeout(() => textareaRef.current?.focus(), 100);
                }
            };

            // Autoguardado
            useEffect(() => {
                if (!username || !currentNoteId) return;

                const timer = setTimeout(() => {
                    const currentNote = notes.find(n => n.id === currentNoteId);
                    if (!currentNote || noteContent === currentNote.content) return;
                    markNoteChanged(currentNoteId, noteContent);
                }, 2000);

                return () => clearTimeout(timer);
            }, [noteContent, currentNoteId, username]);

            // Crear nueva nota
            const createNewNote = async () => {
                try {
                    setIsLoading(true);

                    const noteCount = notes.length + 1;
                    const newTitle = `Nota ${noteCount}`;
                    const noteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}`;
                    const newNote = {
                        id: noteId,
                        title: newTitle,
                        content: '',
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString(),
                        needsSync: true,
                        isNew: true
                    };

                    const newNotes = addLocalNote(newNote);
                    setCurrentNoteId(newNote.id);
                    setNoteContent('');
                    setTimeout(() => textareaRef.current?.focus(), 100);

                    if (navigator.onLine) {
                        await syncPendingChanges(username, newNotes);
                    }
                } catch (err) {
                    console.error('Error creando nota:', err);
                } finally {
                    setIsLoading(false);
                }
            };

            // Eliminar nota
            const deleteNote = async (noteId, e) => {
                e.stopPropagation();

                if (!confirm('¿Estás seguro?')) return;

                try {
                    if (navigator.onLine) {
                        const { error } = await supabaseClient
                            .from('notes')
                            .delete()
                            .eq('id', noteId)
                            .eq('user_id', username);

                        if (error) throw error;
                    }

                    const updatedNotes = removeLocalNote(noteId);
                    setNotes(updatedNotes);

                    if (currentNoteId === noteId) {
                        if (updatedNotes.length > 0) {
                            setCurrentNoteId(updatedNotes[0].id);
                            setNoteContent(updatedNotes[0].content);
                        } else {
                            setCurrentNoteId(null);
                            setNoteContent('');
                        }
                    }
                } catch (err) {
                    console.error('Error eliminando:', err);
                }
            };

            // Logout
            const handleLogout = () => {
                localStorage.removeItem('noterok_user');
                setUsername('');
                setNotes([]);
                setCurrentNoteId(null);
                setNoteContent('');
                setLoginError('');
                setModalOpen(false);
            };

            // Verificar sesión guardada
            useEffect(() => {
                const savedUsername = localStorage.getItem('noterok_user');
                if (savedUsername) {
                    setUsername(savedUsername);
                    setIsLoading(true);
                    loadNotes(savedUsername);
                }
            }, []);

            // Re-sincronizar cuando vuelva la conexión
            useEffect(() => {
                const handleOnline = () => {
                    if (!username) return;
                    const localNotes = loadNotesFromLocal(username);
                    syncPendingChanges(username, localNotes);
                };

                window.addEventListener('online', handleOnline);
                return () => window.removeEventListener('online', handleOnline);
            }, [username]);

            // Login Screen
            if (!username) {
                return (
                    <div className="login-container">
                        <div className="login-card">
                            <h1>NoteRok</h1>
                            <div className="login-form">
                                <input
                                    type="text"
                                    className="login-input"
                                    placeholder="Usuario"
                                    value={inputUsername}
                                    onChange={(e) => setInputUsername(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    disabled={isLoading}
                                    autoFocus
                                />
                                <button 
                                    className="login-btn"
                                    onClick={handleLogin}
                                    disabled={isLoading}
                                >
                                    {isLoading ? 'Cargando...' : 'Acceder'}
                                </button>
                                {loginError && <div className="login-error">{loginError}</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            // Editor Screen
            return (
                <div className="editor-container">
                    <div className="editor-header">
                        <button 
                            className="btn-icon"
                            onClick={createNewNote}
                            disabled={isLoading}
                            title="Nueva nota"
                        >
                            +
                        </button>
                        <button 
                            className="btn-icon"
                            onClick={() => setModalOpen(!modalOpen)}
                            disabled={isLoading}
                            title="Menú de notas"
                        >
                            ☰
                        </button>
                    </div>

                    <div className="editor-main">
                        <textarea
                            ref={textareaRef}
                            className="editor-textarea"
                            value={noteContent}
                            onChange={(e) => setNoteContent(e.target.value)}
                            disabled={!currentNoteId || isLoading}
                            autoFocus
                        />
                    </div>

                    {/* Modal Overlay */}
                    <div 
                        className={`modal-overlay ${modalOpen ? 'show' : ''}`}
                        onClick={() => setModalOpen(false)}
                    />

                    {/* Notes Modal */}
                    <div className={`notes-modal ${modalOpen ? 'show' : ''}`}>
                        <div className="modal-header">
                            <h3>Notas</h3>
                            <button 
                                className="close-modal-btn"
                                onClick={() => setModalOpen(false)}
                            >
                                ×
                            </button>
                        </div>

                        <div className="modal-content">
                            {notes.length === 0 ? (
                                <div className="empty-state">
                                    No hay notas. Toca el + para crear una.
                                </div>
                            ) : (
                                <div className="notes-list">
                                    {notes.map(note => (
                                        <div
                                            key={note.id}
                                            className={`note-item ${currentNoteId === note.id ? 'active' : ''}`}
                                            onClick={() => selectNote(note.id)}
                                        >
                                            <div className="note-item-content">
                                                <div className="note-item-title">{note.title}</div>
                                            </div>
                                            <button
                                                className="note-delete-btn"
                                                onClick={(e) => deleteNote(note.id, e)}
                                                title="Eliminar"
                                            >
                                                ×
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="user-info">
                            Usuario: <strong>{username}</strong>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<NoteRok />, document.getElementById('root'));
    </script>
</body>
</html>
