<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.ibb.co/4wzJ2vTq/image.png">
    <title>NoteRok</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        textarea {
            font-family: 'Courier New', Courier, monospace !important;
            background: #0a0a0a;
            color: #e0e0e0;
            border: none;
            resize: none;
        }

        textarea::placeholder {
            color: #333;
        }

        textarea:focus {
            outline: none;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        /* Login Screen */
        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.8em;
            letter-spacing: 1px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-input {
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #555;
        }

        .login-btn {
            padding: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #444;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Editor Screen */
        .editor-container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .editor-textarea {
            flex: 1;
            width: 100%;
            padding: 30px;
            background: #0a0a0a;
            color: #e0e0e0;
            border: none;
            font-size: 14px;
            line-height: 1.6;
            transition: background 0.2s;
        }

        .editor-textarea:focus {
            background: #0f0f0f;
        }

        /* Hamburger Menu */
        .hamburger-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            z-index: 100;
            transition: all 0.2s;
        }

        .hamburger-btn:hover {
            border-color: #555;
            background: #222;
        }

        .hamburger-line {
            width: 20px;
            height: 2px;
            background: #666;
        }

        /* Sidebar Menu */
        .sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: #1a1a1a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            z-index: 99;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #999;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .note-item {
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            color: #999;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item:hover {
            border-color: #555;
            background: #111;
            color: #ccc;
        }

        .note-item.active {
            border-color: #666;
            background: #222;
            color: #fff;
        }

        .sidebar-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #333;
        }

        .sidebar-btn {
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-btn:hover {
            background: #444;
            border-color: #666;
        }

        .sidebar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sidebar-btn.delete {
            background: #3a1a1a;
            border-color: #552a2a;
        }

        .sidebar-btn.delete:hover {
            background: #4a2a2a;
        }

        .sidebar-btn.logout {
            background: #1a2a3a;
            border-color: #2a3a4a;
        }

        .sidebar-btn.logout:hover {
            background: #1a3a4a;
        }

        .user-info {
            padding: 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .user-info strong {
            color: #999;
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 98;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createClient } = supabase;

        // Supabase Config
        const supabaseUrl = 'https://zgohawnfwbhyuubgzhit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnb2hhd25md2JoeXV1Ymd6aGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2NjExNTQsImV4cCI6MjA4MzIzNzE1NH0.3AF50DVfjnXhlx_chrPFeVXtnhRvFPhreZFq30y1mSY';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const NoteRok = () => {
            const [username, setUsername] = useState('');
            const [inputUsername, setInputUsername] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [notes, setNotes] = useState([]);
            const [currentNoteId, setCurrentNoteId] = useState(null);
            const [noteContent, setNoteContent] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const textareaRef = useRef(null);

            // Login
            const handleLogin = async () => {
                const user = inputUsername.trim().toLowerCase();
                
                if (!user) {
                    setLoginError('Por favor ingresa un usuario');
                    return;
                }

                try {
                    setIsLoading(true);
                    
                    const { data: userData, error: userError } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', user)
                        .single();

                    if (userError) {
                        if (userError.code === 'PGRST116') {
                            setLoginError('Usuario no encontrado');
                        } else {
                            throw userError;
                        }
                        setIsLoading(false);
                        return;
                    }

                    if (!userData || !userData.is_active) {
                        setLoginError('Usuario no autorizado o inactivo');
                        setIsLoading(false);
                        return;
                    }

                    localStorage.setItem('noterok_user', user);
                    setUsername(user);
                    setLoginError('');
                    setInputUsername('');
                    
                    await loadNotes(user);
                    
                } catch (err) {
                    console.error('Error en login:', err);
                    setLoginError('Error: ' + err.message);
                    setIsLoading(false);
                }
            };

            // Cargar notas
            const loadNotes = async (user) => {
                try {
                    const { data, error } = await supabaseClient
                        .from('notes')
                        .select('id, title, content, created_at, updated_at')
                        .eq('user_id', user)
                        .order('updated_at', { ascending: false });

                    if (error) throw error;

                    setNotes(data || []);
                    
                    // Si hay notas, seleccionar la más reciente
                    if (data && data.length > 0) {
                        setCurrentNoteId(data[0].id);
                        setNoteContent(data[0].content);
                    }
                    
                } catch (err) {
                    console.error('Error cargando notas:', err);
                    setLoginError('Error al cargar notas: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // Seleccionar nota
            const selectNote = async (noteId) => {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    setCurrentNoteId(noteId);
                    setNoteContent(note.content);
                    setSidebarOpen(false);
                    setTimeout(() => textareaRef.current?.focus(), 100);
                }
            };

            // Autoguardado
            useEffect(() => {
                if (!username || !currentNoteId) return;

                const timer = setTimeout(async () => {
                    const currentNote = notes.find(n => n.id === currentNoteId);
                    if (noteContent === currentNote?.content) return;

                    try {
                        await supabaseClient
                            .from('notes')
                            .update({
                                content: noteContent,
                                updated_at: new Date().toISOString()
                            })
                            .eq('id', currentNoteId)
                            .eq('user_id', username);

                        // Actualizar la lista de notas sin cerrar el editor
                        const updatedNotes = notes.map(n => 
                            n.id === currentNoteId 
                                ? { ...n, content: noteContent, updated_at: new Date().toISOString() }
                                : n
                        ).sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                        
                        setNotes(updatedNotes);

                    } catch (err) {
                        console.error('Error guardando:', err);
                    }
                }, 2000);

                return () => clearTimeout(timer);
            }, [noteContent, currentNoteId, username]);

            // Crear nueva nota
            const createNewNote = async () => {
                try {
                    setIsLoading(true);

                    const noteCount = notes.length + 1;
                    const newTitle = `Nota ${noteCount}`;

                    const { data, error } = await supabaseClient
                        .from('notes')
                        .insert({
                            user_id: username,
                            title: newTitle,
                            content: ''
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    const newNotes = [data, ...notes];
                    setNotes(newNotes);
                    setCurrentNoteId(data.id);
                    setNoteContent('');
                    setSidebarOpen(false);
                    setTimeout(() => textareaRef.current?.focus(), 100);

                } catch (err) {
                    console.error('Error creando nota:', err);
                    setLoginError('Error: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // Eliminar nota
            const deleteNote = async () => {
                if (!currentNoteId) return;

                if (!confirm('¿Estás seguro?')) return;

                try {
                    setIsLoading(true);

                    const { error } = await supabaseClient
                        .from('notes')
                        .delete()
                        .eq('id', currentNoteId)
                        .eq('user_id', username);

                    if (error) throw error;

                    const updatedNotes = notes.filter(n => n.id !== currentNoteId);
                    setNotes(updatedNotes);
                    
                    if (updatedNotes.length > 0) {
                        setCurrentNoteId(updatedNotes[0].id);
                        setNoteContent(updatedNotes[0].content);
                    } else {
                        setCurrentNoteId(null);
                        setNoteContent('');
                    }
                    
                    setSidebarOpen(false);

                } catch (err) {
                    console.error('Error eliminando:', err);
                } finally {
                    setIsLoading(false);
                }
            };

            // Logout
            const handleLogout = () => {
                localStorage.removeItem('noterok_user');
                setUsername('');
                setNotes([]);
                setCurrentNoteId(null);
                setNoteContent('');
                setLoginError('');
                setSidebarOpen(false);
            };

            // Verificar sesión guardada
            useEffect(() => {
                const savedUsername = localStorage.getItem('noterok_user');
                if (savedUsername) {
                    setUsername(savedUsername);
                    setIsLoading(true);
                    loadNotes(savedUsername);
                }
            }, []);

            // Cerrar sidebar al hacer click en overlay
            const handleOverlayClick = () => {
                setSidebarOpen(false);
            };

            // Login Screen
            if (!username) {
                return (
                    <div className="login-container">
                        <div className="login-card">
                            <h1>NoteRok</h1>
                            <div className="login-form">
                                <input
                                    type="text"
                                    className="login-input"
                                    placeholder="Usuario"
                                    value={inputUsername}
                                    onChange={(e) => setInputUsername(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    disabled={isLoading}
                                    autoFocus
                                />
                                <button 
                                    className="login-btn"
                                    onClick={handleLogin}
                                    disabled={isLoading}
                                >
                                    {isLoading ? 'Cargando...' : 'Acceder'}
                                </button>
                                {loginError && <div className="login-error">{loginError}</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            // Editor Screen
            return (
                <div className="editor-container">
                    <div className="editor-main">
                        <textarea
                            ref={textareaRef}
                            className="editor-textarea"
                            value={noteContent}
                            onChange={(e) => setNoteContent(e.target.value)}
                            disabled={!currentNoteId || isLoading}
                            autoFocus
                        />
                    </div>

                    <button 
                        className="hamburger-btn"
                        onClick={() => setSidebarOpen(!sidebarOpen)}
                        disabled={isLoading}
                    >
                        <div className="hamburger-line"></div>
                        <div className="hamburger-line"></div>
                        <div className="hamburger-line"></div>
                    </button>

                    <div 
                        className={`overlay ${sidebarOpen ? 'show' : ''}`}
                        onClick={handleOverlayClick}
                    />

                    <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-header">
                            <h3>Notas</h3>
                            <button 
                                className="close-btn"
                                onClick={() => setSidebarOpen(false)}
                            >
                                ×
                            </button>
                        </div>

                        <div className="sidebar-content">
                            {notes.length === 0 ? (
                                <div className="empty-state">
                                    No hay notas. Crea una para comenzar.
                                </div>
                            ) : (
                                <div className="notes-list">
                                    {notes.map(note => (
                                        <div
                                            key={note.id}
                                            className={`note-item ${currentNoteId === note.id ? 'active' : ''}`}
                                            onClick={() => selectNote(note.id)}
                                            title={note.title}
                                        >
                                            {note.title}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="sidebar-controls">
                            <button 
                                className="sidebar-btn"
                                onClick={createNewNote}
                                disabled={isLoading}
                            >
                                + Nueva Nota
                            </button>
                            <button 
                                className="sidebar-btn delete"
                                onClick={deleteNote}
                                disabled={!currentNoteId || isLoading}
                            >
                                🗑️ Eliminar
                            </button>
                            <button 
                                className="sidebar-btn logout"
                                onClick={handleLogout}
                                disabled={isLoading}
                            >
                                Logout
                            </button>
                        </div>

                        <div className="user-info">
                            Usuario: <strong>{username}</strong>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<NoteRok />, document.getElementById('root'));
    </script>
</body>
</html>
