<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.ibb.co/4wzJ2vTq/image.png">
    <title>NoteRok</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Login Screen */
        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.8em;
            letter-spacing: 1px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-input {
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #555;
        }

        .login-btn {
            padding: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #444;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Editor Screen */
        .editor-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            gap: 10px;
        }

        .mobile-menu-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            left: auto;
            z-index: 101;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #2b2b2b;
            color: #8d8d8d;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-toggle:hover {
            border-color: #444;
            background: #1d1d1d;
            color: #c5c5c5;
        }

        @media (max-width: 760px) {
            html, body, #root {
                overflow-x: hidden;
            }

            .editor-header {
                display: none;
            }

            .mobile-menu-toggle {
                display: flex;
                right: 12px;
                left: auto;
            }

            .editor-textarea {
                padding: 20px 16px 16px;
                font-size: 15px;
            }

            .notes-modal {
                width: 90%;
                max-width: 360px;
            }

            .modal-header {
                padding: 16px;
            }
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            background: #111;
            border: 1px solid #2b2b2b;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8d8d8d;
            font-size: 16px;
            transition: all 0.2s;
        }

        .modal-new-btn {
            min-width: 140px;
            height: 44px;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 15px;
            justify-content: center;
            background: #111;
            border: 1px solid #2b2b2b;
            color: #cfcfcf;
        }

        .btn-icon:hover:not(:disabled) {
            border-color: #444;
            background: #1d1d1d;
            color: #c5c5c5;
        }

        .btn-icon:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            color: #555;
            border-color: #222;
            background: #0f0f0f;
        }

        /* Main Content */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
        }

        .editor-textarea {
            flex: 1;
            width: 100%;
            padding: 30px;
            background: #0a0a0a;
            color: #e0e0e0;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: background 0.2s;
        }

        .editor-textarea:focus {
            outline: none;
            background: #0f0f0f;
        }

        .editor-textarea::placeholder {
            color: #333;
        }

        .editor-textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 98;
        }

        .modal-overlay.show {
            display: block;
        }

        /* Modal */
        .notes-modal {
            position: fixed;
            top: 0;
            right: -360px;
            width: 360px;
            height: 100%;
            background: #1a1a1a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            z-index: 99;
        }

        .notes-modal.show {
            right: 0;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            min-height: 64px;
        }

        .modal-header h3 {
            color: #fff;
            font-size: 16px;
        }

        .modal-header .modal-new-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            min-width: 140px;
            height: 44px;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 15px;
            justify-content: center;
            background: #111;
            border: 1px solid #2b2b2b;
            color: #cfcfcf;
            display: flex;
            align-items: center;
        }

        .close-modal-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: #999;
        }

        /* Notes List */
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item:hover {
            border-color: #555;
            background: #111;
        }

        .note-item.active {
            border-color: #666;
            background: #222;
        }

        .note-item-content {
            flex: 1;
            overflow: hidden;
        }

        .note-item-title {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item.active .note-item-title {
            color: #fff;
        }

        .note-action-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .note-action-btn:hover {
            color: #ccc;
        }

        .note-delete-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .note-delete-btn:hover {
            color: #ff6b6b;
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }

        .modal-footer {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .modal-footer-btn {
            flex: 1;
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-footer-btn:hover {
            background: #444;
            border-color: #666;
        }

        .modal-footer-btn.logout {
            background: #1a2a3a;
            border-color: #2a3a4a;
        }

        .modal-footer-btn.logout:hover {
            background: #1a3a4a;
        }

        .user-info {
            padding: 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .user-info strong {
            color: #999;
        }
        .dev-credit {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }

        .dev-credit a {
            color: #999;
            text-decoration: none;
        }

        .dev-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            background: transparent;
            border: none;
            color: #cfcfcf;
            font-size: 12px;
        }
        .dev-icon svg {
            width: 18px;
            height: 18px;
            display: block;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createClient } = supabase;

        const supabaseUrl = 'https://zgohawnfwbhyuubgzhit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnb2hhd25md2JoeXV1Ymd6aGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2NjExNTQsImV4cCI6MjA4MzIzNzE1NH0.3AF50DVfjnXhlx_chrPFeVXtnhRvFPhreZFq30y1mSY';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const NoteRok = () => {
            const [username, setUsername] = useState('');
            const [inputUsername, setInputUsername] = useState('');
            const [inputPassword, setInputPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [notes, setNotes] = useState([]);
            const [currentNoteId, setCurrentNoteId] = useState(null);
            const [noteContent, setNoteContent] = useState('');
            const [modalOpen, setModalOpen] = useState(false);
            const [clipboardAvailable, setClipboardAvailable] = useState(false);
            const [clipboardText, setClipboardText] = useState('');
            const [panelVisible, setPanelVisible] = useState(true);
            const [isMobile, setIsMobile] = useState(false);
            const textareaRef = useRef(null);

            const getLocalNotesKey = (user) => `noterok_notes_${user}`;
            const getPanelVisibilityKey = () => 'noterok_panel_visible';
            const getDeletedIdsKey = (user) => `noterok_deleted_${user}`;
            const getLocalSessionKey = () => 'noterok_user';

            const sortNotesByCreatedAt = (noteList) => {
                return [...noteList].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            };

            const normalizeTitle = (title) => {
                return title.trim().replace(/\s+/g, ' ');
            };

            const getTitleFromContent = (content, fallbackTitle) => {
                const text = (content || '').trim();
                if (!text) return fallbackTitle || 'Nota';

                const firstLine = text.split('\n')[0].trim();
                const words = firstLine.split(/\s+/).filter(Boolean);
                if (words.length <= 3) {
                    return firstLine;
                }
                return words.slice(0, 3).join(' ');
            };

            const getUniqueTitle = (baseTitle, noteIdToSkip = null) => {
                const normalized = normalizeTitle(baseTitle).replace(/\s*\(v\d+\)$/i, '');
                if (!normalized) return baseTitle;
                const lowerBase = normalized.toLowerCase();
                const existingTitles = notes
                    .filter(n => n.id !== noteIdToSkip)
                    .map(n => normalizeTitle(n.title).toLowerCase());
                if (!existingTitles.includes(lowerBase)) return normalized;
                let version = 2;
                while (existingTitles.includes(`${normalized} (v${version})`.toLowerCase())) {
                    version += 1;
                }
                return `${normalized} (v${version})`;
            };

            const mergeLocalAndServerNotes = (serverNotes, localNotes) => {
                const localById = new Map(localNotes.map(note => [note.id, note]));
                const mergedServer = serverNotes.map(serverNote => {
                    const localNote = localById.get(serverNote.id);
                    if (localNote && localNote.needsSync) {
                        return localNote;
                    }
                    return serverNote;
                });
                const serverIds = new Set(serverNotes.map(note => note.id));
                const extraLocalNotes = localNotes.filter(note => !serverIds.has(note.id));
                return sortNotesByCreatedAt([...mergedServer, ...extraLocalNotes]);
            };

            const buildVersionedTitle = (title, existingTitles) => {
                const normalized = normalizeTitle(title).replace(/\s*\(v\d+\)$/i, '');
                let version = 2;
                const exists = (candidate) => existingTitles.some(t => normalizeTitle(t).toLowerCase() === normalizeTitle(candidate).toLowerCase());
                while (exists(`${normalized} (v${version})`)) {
                    version += 1;
                }
                return `${normalized} (v${version})`;
            };

            const saveNotesToLocal = (user, noteList, activeId = currentNoteId) => {
                if (!user) return;
                const cleanNotes = Array.isArray(noteList)
                    ? noteList.filter(note => !(note.isNew && note.content.trim() === '' && note.id !== activeId))
                    : [];
                localStorage.setItem(getLocalNotesKey(user), JSON.stringify(cleanNotes));
            };

            const loadNotesFromLocal = (user) => {
                if (!user) return [];
                const raw = localStorage.getItem(getLocalNotesKey(user));
                if (!raw) return [];
                try {
                    const parsed = JSON.parse(raw);
                    return Array.isArray(parsed)
                        ? parsed.filter(note => note.content?.trim() !== '' || note.isNew)
                        : [];
                } catch (err) {
                    console.error('Error parseando notas locales:', err);
                    return [];
                }
            };

                    const saveDeletedIds = (user, deletedIds) => {
                if (!user) return;
                localStorage.setItem(getDeletedIdsKey(user), JSON.stringify(deletedIds));
            };

            const loadDeletedIds = (user) => {
                if (!user) return [];
                const raw = localStorage.getItem(getDeletedIdsKey(user));
                if (!raw) return [];
                try {
                    return JSON.parse(raw);
                } catch (err) {
                    console.error('Error parseando eliminaciones locales:', err);
                    return [];
                }
            };

            const updateLocalNotes = (user, updatedNotes) => {
                setNotes(updatedNotes);
                saveNotesToLocal(user, updatedNotes);
            };

            const savePanelVisibility = (visible) => {
                localStorage.setItem(getPanelVisibilityKey(), JSON.stringify(visible));
            };

            const togglePanelVisibility = () => {
                const nextVisible = !panelVisible;
                setPanelVisible(nextVisible);
                savePanelVisibility(nextVisible);
                if (!nextVisible) {
                    setModalOpen(false);
                }
            };

            const openNotesMenu = () => setModalOpen((prev) => !prev);

            const refreshClipboardState = async () => {
                if (!navigator.clipboard || !navigator.clipboard.readText) {
                    setClipboardAvailable(false);
                    setClipboardText('');
                    return;
                }
                try {
                    const text = (await navigator.clipboard.readText()).trim();
                    setClipboardText(text);
                    setClipboardAvailable(text.length > 0);
                } catch (err) {
                    setClipboardText('');
                    setClipboardAvailable(false);
                }
            };

            const copyActiveNote = async () => {
                if (!navigator.clipboard || !navigator.clipboard.writeText || !currentNoteId) return;
                const note = notes.find(n => n.id === currentNoteId);
                if (!note) return;
                const text = note.content || '';
                try {
                    await navigator.clipboard.writeText(text);
                    setClipboardText(text);
                    setClipboardAvailable(text.trim().length > 0);
                } catch (err) {
                    console.error('Error copiando nota:', err);
                }
            };

            const pasteClipboardToNewNote = async () => {
                if (!navigator.clipboard || !navigator.clipboard.readText || !username) return;
                try {
                    const text = (await navigator.clipboard.readText()).trim();
                    if (!text) return;
                    const noteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}`;
                    const newNote = {
                        id: noteId,
                        title: getTitleFromContent(text, 'Nota'),
                        content: text,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString(),
                        needsSync: true,
                        isNew: true
                    };
                    const newNotes = [newNote, ...notes];
                    setNotes(newNotes);
                    setCurrentNoteId(newNote.id);
                    setNoteContent(newNote.content);
                    setTimeout(() => textareaRef.current?.focus(), 100);
                    saveNotesToLocal(username, newNotes);
                    if (navigator.onLine) syncPendingChanges(username, newNotes);
                } catch (err) {
                    console.error('Error pegando nota:', err);
                }
            };

            const syncPendingChanges = async (user, currentNotes) => {
                if (!navigator.onLine || !user) return;

                const notesToSync = currentNotes.filter(note => note.needsSync && !(note.isNew && note.content.trim() === ''));
                const deletedIds = loadDeletedIds(user);
                const updatedNotes = [...currentNotes];

                for (const note of notesToSync) {
                    try {
                        const localIndex = updatedNotes.findIndex(n => n.id === note.id);
                        if (note.isNew) {
                            const { data, error } = await supabaseClient
                                .from('notes')
                                .insert({
                                    id: note.id,
                                    user_id: user,
                                    title: note.title,
                                    content: note.content,
                                    created_at: note.created_at || new Date().toISOString(),
                                    updated_at: note.updated_at
                                })
                                .select()
                                .single();

                            if (error) throw error;
                            updatedNotes[localIndex] = {
                                ...note,
                                isNew: false,
                                needsSync: false,
                                server_updated_at: data.updated_at
                            };
                        } else {
                            const { data: serverNote, error: fetchError } = await supabaseClient
                                .from('notes')
                                .select('id, title, content, updated_at')
                                .eq('id', note.id)
                                .eq('user_id', user)
                                .single();

                            if (fetchError && fetchError.code !== 'PGRST116') {
                                throw fetchError;
                            }

                            const serverUpdatedAt = serverNote?.updated_at;
                            const hasConflict = serverUpdatedAt && note.server_updated_at && new Date(serverUpdatedAt) > new Date(note.server_updated_at);

                            if (serverNote && hasConflict) {
                                const existingTitles = updatedNotes.map(n => n.title);
                                const versionedTitle = buildVersionedTitle(note.title, existingTitles);
                                const newNoteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}-${Math.random().toString(16).slice(2)}`;
                                const { data, error } = await supabaseClient
                                    .from('notes')
                                    .insert({
                                        id: newNoteId,
                                        user_id: user,
                                        title: versionedTitle,
                                        content: note.content,
                                        created_at: new Date().toISOString(),
                                        updated_at: note.updated_at
                                    })
                                    .select()
                                    .single();

                                if (error) throw error;

                                updatedNotes[localIndex] = {
                                    ...note,
                                    id: data.id,
                                    title: data.title,
                                    isNew: false,
                                    needsSync: false,
                                    server_updated_at: data.updated_at
                                };
                                if (currentNoteId === note.id) {
                                    setCurrentNoteId(data.id);
                                }
                            } else {
                                const { error } = await supabaseClient
                                    .from('notes')
                                    .update({
                                        title: note.title,
                                        content: note.content,
                                        updated_at: note.updated_at
                                    })
                                    .eq('id', note.id)
                                    .eq('user_id', user);

                                if (error) throw error;
                                updatedNotes[localIndex] = {
                                    ...note,
                                    needsSync: false,
                                    server_updated_at: note.updated_at
                                };
                            }
                        }
                    } catch (err) {
                        console.error('Error sincronizando nota:', note.id, err);
                    }
                }

                if (deletedIds.length > 0) {
                    const syncedIds = [];
                    for (const id of deletedIds) {
                        try {
                            const { error } = await supabaseClient
                                .from('notes')
                                .delete()
                                .eq('id', id)
                                .eq('user_id', user);

                            if (error) throw error;
                            syncedIds.push(id);
                        } catch (err) {
                            console.error('Error sincronizando eliminación:', id, err);
                        }
                    }
                    const remainingDeleted = deletedIds.filter(id => !syncedIds.includes(id));
                    saveDeletedIds(user, remainingDeleted);
                }

                const cleanedNotes = updatedNotes
                    .filter(note => !note._deleted)
                    .filter(note => !(note.isNew && note.content.trim() === ''));
                cleanedNotes.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                updateLocalNotes(user, cleanedNotes);
            };

            const updateDraftNote = (noteId, newContent) => {
                const updatedNotes = notes.map(note => {
                    if (note.id !== noteId) return note;
                    if (note.isNew && newContent.trim() === '') return note;
                    const baseTitle = getTitleFromContent(newContent, note.title);
                    return {
                        ...note,
                        content: newContent,
                        title: getUniqueTitle(baseTitle, noteId),
                        updated_at: new Date().toISOString(),
                        needsSync: true
                    };
                });
                setNotes(updatedNotes);
                saveNotesToLocal(username, updatedNotes);
            };

            const downloadNoteAsTxt = (note) => {
                const blob = new Blob([note.content || ''], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const filename = `${note.title || 'nota'}.txt`.replace(/[^a-zA-Z0-9-_\. ]/g, '_');
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const markNoteChanged = (noteId, newContent) => {
                const note = notes.find(n => n.id === noteId);
                if (!note) return;

                if (note.isNew && newContent.trim() === '') {
                    if (currentNoteId === noteId) {
                        // Mantener la nota abierta mientras el usuario está escribiendo
                        return;
                    }
                    const updatedNotes = notes.filter(n => n.id !== noteId);
                    if (currentNoteId === noteId) {
                        const nextNote = updatedNotes[0];
                        setCurrentNoteId(nextNote ? nextNote.id : null);
                        setNoteContent(nextNote ? nextNote.content : '');
                    }
                    updateLocalNotes(username, updatedNotes);
                    return;
                }

                if (!note.needsSync && note.content === newContent) return;

                const updatedNotes = notes.map(note => {
                    if (note.id !== noteId) return note;
                    const baseTitle = getTitleFromContent(newContent, note.title);
                    return {
                        ...note,
                        content: newContent,
                        title: getUniqueTitle(baseTitle, noteId),
                        updated_at: new Date().toISOString(),
                        needsSync: true
                    };
                });
                updateLocalNotes(username, updatedNotes);
                if (navigator.onLine) syncPendingChanges(username, updatedNotes);
            };

            const addLocalNote = (newNote) => {
                const updatedNotes = [newNote, ...notes];
                setNotes(updatedNotes);
                if (navigator.onLine && newNote.content.trim() !== '') {
                    syncPendingChanges(username, updatedNotes);
                }
                return updatedNotes;
            };

            const removeLocalNote = (noteId) => {
                const updatedNotes = notes.filter(note => note.id !== noteId);
                const deletedIds = loadDeletedIds(username);
                const newDeletedIds = deletedIds.includes(noteId) ? deletedIds : [...deletedIds, noteId];
                saveDeletedIds(username, newDeletedIds);
                updateLocalNotes(username, updatedNotes);
                if (navigator.onLine) syncPendingChanges(username, updatedNotes);
                return updatedNotes;
            };

            // Login
            const handleLogin = async () => {
                const user = inputUsername.trim().toLowerCase();
                
                if (!user) {
                    setLoginError('Por favor ingresa un usuario');
                    return;
                }

                try {
                    setIsLoading(true);
                    
                    if (!inputPassword) {
                        setLoginError('Ingresa tu contraseña');
                        setIsLoading(false);
                        return;
                    }

                    const { data: userData, error: userError } = await supabaseClient
                        .rpc('verify_user_password', {
                            in_username: user,
                            in_password: inputPassword
                        })
                        .single();

                    if (userError) {
                        console.error('Login RPC error:', userError);
                        setLoginError('Usuario o contraseña incorrectos');
                        setIsLoading(false);
                        return;
                    }

                    if (!userData || !userData.is_active) {
                        setLoginError('Usuario o contraseña incorrectos');
                        setIsLoading(false);
                        return;
                    }

                    localStorage.setItem('noterok_user', user);
                    setUsername(user);
                    setLoginError('');
                    setInputUsername('');
                    setInputPassword('');
                    
                    await loadNotes(user);
                    refreshClipboardState();
                    
                } catch (err) {
                    console.error('Error en login:', err);
                    setLoginError('Error: ' + err.message);
                    setIsLoading(false);
                }
            };

            // Cargar notas
            const loadNotes = async (user) => {
                try {
                    const localNotes = sortNotesByCreatedAt(loadNotesFromLocal(user));

                    if (!navigator.onLine) {
                        setNotes(localNotes);
                        if (localNotes.length > 0) {
                            setCurrentNoteId(localNotes[0].id);
                            setNoteContent(localNotes[0].content);
                            setTimeout(() => textareaRef.current?.focus(), 100);
                        }
                        return;
                    }

                    const { data, error } = await supabaseClient
                        .from('notes')
                        .select('id, title, content, created_at, updated_at')
                        .eq('user_id', user)
                        .order('created_at', { ascending: false });

                    if (error) {
                        throw error;
                    }

                    const serverNotes = (data || []).map(note => ({
                        ...note,
                        needsSync: false,
                        isNew: false
                    }));

                    const notesToUse = serverNotes.length > 0
                        ? mergeLocalAndServerNotes(serverNotes, localNotes)
                        : localNotes;

                    if (notesToUse.length === 0) {
                        const initialNoteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}`;
                        const initialNote = {
                            id: initialNoteId,
                            title: 'Nota 1',
                            content: '',
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString(),
                            needsSync: true,
                            isNew: true
                        };
                        setNotes([initialNote]);
                        setCurrentNoteId(initialNote.id);
                        setNoteContent('');
                        setTimeout(() => textareaRef.current?.focus(), 100);
                        return;
                    }

                    setNotes(notesToUse);

                    if (notesToUse.length > 0) {
                        setCurrentNoteId(notesToUse[0].id);
                        setNoteContent(notesToUse[0].content);
                        setTimeout(() => textareaRef.current?.focus(), 100);
                    }

                    saveNotesToLocal(user, notesToUse);
                } catch (err) {
                    console.error('Error cargando notas:', err);
                    const localNotes = sortNotesByCreatedAt(loadNotesFromLocal(user));
                    if (localNotes.length > 0) {
                        setNotes(localNotes);
                        setCurrentNoteId(localNotes[0].id);
                        setNoteContent(localNotes[0].content);
                        setTimeout(() => textareaRef.current?.focus(), 100);
                    } else {
                        const initialNoteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}`;
                        const initialNote = {
                            id: initialNoteId,
                            title: 'Nota 1',
                            content: '',
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString(),
                            needsSync: true,
                            isNew: true
                        };
                        setNotes([initialNote]);
                        setCurrentNoteId(initialNote.id);
                        setNoteContent('');
                        setTimeout(() => textareaRef.current?.focus(), 100);
                    }
                    setLoginError('Modo offline: usando notas locales');
                } finally {
                    setIsLoading(false);
                }
            };

            // Seleccionar nota
            const selectNote = (noteId) => {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    setCurrentNoteId(noteId);
                    setNoteContent(note.content);
                    setModalOpen(false);
                    setTimeout(() => textareaRef.current?.focus(), 100);
                }
            };

            // Autoguardado
            useEffect(() => {
                if (!username || !currentNoteId) return;

                const timer = setTimeout(() => {
                    markNoteChanged(currentNoteId, noteContent);
                }, 2000);

                return () => clearTimeout(timer);
            }, [noteContent, currentNoteId, username]);

            useEffect(() => {
                if (!currentNoteId) return;
                setTimeout(() => textareaRef.current?.focus(), 0);
            }, [currentNoteId]);

            useEffect(() => {
                if (!username) return;
                saveNotesToLocal(username, notes);
            }, [username, notes]);

            // Crear nueva nota
            const createNewNote = async () => {
                try {
                    setIsLoading(true);

                    const emptyCurrentNote = notes.find(n => n.id === currentNoteId && n.isNew && n.content.trim() === '');
                    const baseNotes = emptyCurrentNote ? notes.filter(n => n.id !== currentNoteId) : notes;
                    const noteCount = baseNotes.length + 1;
                    const baseTitle = `Nota ${noteCount}`;
                    const newTitle = getUniqueTitle(baseTitle);
                    const noteId = crypto.randomUUID ? crypto.randomUUID() : `note-${Date.now()}`;
                    const newNote = {
                        id: noteId,
                        title: newTitle,
                        content: '',
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString(),
                        needsSync: true,
                        isNew: true
                    };
                    const newNotes = [newNote, ...baseNotes];
                    setNotes(newNotes);
                    setCurrentNoteId(newNote.id);
                    setNoteContent('');
                    setTimeout(() => textareaRef.current?.focus(), 100);
                    saveNotesToLocal(username, newNotes, newNote.id);

                    if (navigator.onLine && newNote.content.trim() !== '') {
                        await syncPendingChanges(username, newNotes);
                    }
                } catch (err) {
                    console.error('Error creando nota:', err);
                } finally {
                    setIsLoading(false);
                }
            };

            // Eliminar nota
            const deleteNote = async (noteId, e) => {
                e.stopPropagation();

                if (!confirm('¿Estás seguro?')) return;

                try {
                    if (navigator.onLine) {
                        const { error } = await supabaseClient
                            .from('notes')
                            .delete()
                            .eq('id', noteId)
                            .eq('user_id', username);

                        if (error) throw error;
                    }

                    const updatedNotes = removeLocalNote(noteId);
                    setNotes(updatedNotes);

                    if (currentNoteId === noteId) {
                        if (updatedNotes.length > 0) {
                            setCurrentNoteId(updatedNotes[0].id);
                            setNoteContent(updatedNotes[0].content);
                        } else {
                            setCurrentNoteId(null);
                            setNoteContent('');
                        }
                    }
                } catch (err) {
                    console.error('Error eliminando:', err);
                }
            };

            useEffect(() => {
                const handleGlobalShortcuts = (event) => {
                    if (!event.ctrlKey) return;
                    const key = event.key.toLowerCase();
                    if (key === 'h') {
                        event.preventDefault();
                        if (!isMobile) togglePanelVisibility();
                    }
                    if (key === 'n') {
                        event.preventDefault();
                        createNewNote();
                    }
                    if (key === 'm') {
                        event.preventDefault();
                        setModalOpen((prev) => !prev);
                    }
                };

                window.addEventListener('keydown', handleGlobalShortcuts);
                return () => window.removeEventListener('keydown', handleGlobalShortcuts);
            }, [panelVisible, createNewNote]);

            // Logout
            const handleLogout = () => {
                localStorage.removeItem('noterok_user');
                setUsername('');
                setNotes([]);
                setCurrentNoteId(null);
                setNoteContent('');
                setLoginError('');
                setModalOpen(false);
            };

            // Verificar sesión guardada
            useEffect(() => {
                const savedUsername = localStorage.getItem('noterok_user');
                const savedVisibility = localStorage.getItem(getPanelVisibilityKey());
                if (savedVisibility !== null) {
                    setPanelVisible(JSON.parse(savedVisibility));
                }
                if (savedUsername) {
                    setUsername(savedUsername);
                    setIsLoading(true);
                    loadNotes(savedUsername);
                }
                refreshClipboardState();
            }, []);

            useEffect(() => {
                const updateIsMobile = () => {
                    const mediaQuery = window.matchMedia('(max-width: 760px)');
                    setIsMobile(mediaQuery.matches);
                };
                updateIsMobile();
                window.addEventListener('resize', updateIsMobile);
                return () => window.removeEventListener('resize', updateIsMobile);
            }, []);

            // Re-sincronizar cuando vuelva la conexión
            useEffect(() => {
                const handleOnline = () => {
                    if (!username) return;
                    const localNotes = loadNotesFromLocal(username);
                    syncPendingChanges(username, localNotes);
                };

                window.addEventListener('online', handleOnline);
                return () => window.removeEventListener('online', handleOnline);
            }, [username]);

            // Login Screen
            if (!username) {
                return (
                    <div className="login-container">
                        <div className="login-card">
                            <h1>NoteRok</h1>
                            <div className="login-form">
                                <input
                                    type="text"
                                    className="login-input"
                                    placeholder="Usuario"
                                    value={inputUsername}
                                    onChange={(e) => setInputUsername(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    disabled={isLoading}
                                    autoFocus
                                />
                                <input
                                    type="password"
                                    className="login-input"
                                    placeholder="Contraseña"
                                    value={inputPassword}
                                    onChange={(e) => setInputPassword(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    disabled={isLoading}
                                />
                                <button 
                                    className="login-btn"
                                    onClick={handleLogin}
                                    disabled={isLoading}
                                >
                                    {isLoading ? 'Cargando...' : 'Acceder'}
                                </button>
                                {loginError && <div className="login-error">{loginError}</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            // Editor Screen
            return (
                <div className="editor-container">
                    {isMobile && (
                        <button
                            className="mobile-menu-toggle btn-icon"
                            onClick={openNotesMenu}
                            disabled={isLoading}
                            title={modalOpen ? 'Cerrar notas' : 'Menú de notas'}
                        >
                            {modalOpen ? '×' : '☰'}
                        </button>
                    )}
                    {panelVisible && (
                        <div className="editor-header">
                            <div className="toolbar-group">
                                <button
                                    className="btn-icon"
                                    onClick={copyActiveNote}
                                    disabled={isLoading || !currentNoteId || !noteContent.trim()}
                                    title="Copiar nota activa"
                                >
                                    ⎘
                                </button>
                                {clipboardAvailable && (
                                    <button
                                        className="btn-icon"
                                        onClick={pasteClipboardToNewNote}
                                        disabled={isLoading}
                                        title="Pegar en nueva nota"
                                    >
                                        ⎙
                                    </button>
                                )}
                            </div>
                            {!isMobile && (
                                <div className="toolbar-group">
                                    <button 
                                        className="btn-icon"
                                        onClick={() => setModalOpen(!modalOpen)}
                                        disabled={isLoading}
                                        title="Menú de notas"
                                    >
                                        ☰
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="editor-main">
                        <textarea
                            ref={textareaRef}
                            className="editor-textarea"
                            value={noteContent}
                            onChange={(e) => {
                                const newContent = e.target.value;
                                setNoteContent(newContent);
                                if (currentNoteId) {
                                    updateDraftNote(currentNoteId, newContent);
                                }
                            }}
                            disabled={!currentNoteId || isLoading}
                            autoFocus
                        />
                    </div>

                    {/* Modal Overlay */}
                    <div 
                        className={`modal-overlay ${modalOpen ? 'show' : ''}`}
                        onClick={() => setModalOpen(false)}
                    />

                    {/* Notes Modal */}
                    <div className={`notes-modal ${modalOpen ? 'show' : ''}`}>
                        <div className="modal-header">
                            <h3>v1.0</h3>
                            <button
                                className="modal-new-btn"
                                onClick={createNewNote}
                                title="Nueva nota"
                            >
                                +
                            </button>
                            <div className="toolbar-group">
                                <button 
                                    className="close-modal-btn"
                                    onClick={() => setModalOpen(false)}
                                >
                                    ×
                                </button>
                            </div>
                        </div>

                        <div className="modal-content">
                            {notes.length === 0 ? (
                                <div className="empty-state" style={{height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                                    {/* minimal empty state - new button is in header */}
                                </div>
                            ) : (
                                <div className="notes-list">
                                    {notes.map(note => (
                                        <div
                                            key={note.id}
                                            className={`note-item ${currentNoteId === note.id ? 'active' : ''}`}
                                            onClick={() => selectNote(note.id)}
                                        >
                                            <div className="note-item-content">
                                                <div className="note-item-title">{note.title}</div>
                                            </div>
                                            <button
                                                className="note-action-btn"
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    downloadNoteAsTxt(note);
                                                }}
                                                title="Descargar nota"
                                            >
                                                ↓
                                            </button>
                                            <button
                                                className="note-delete-btn"
                                                onClick={(e) => deleteNote(note.id, e)}
                                                title="Eliminar"
                                            >
                                                ×
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="user-info" style={{display: 'flex', alignItems: 'center'}}>
                            <strong style={{marginRight:8}}>{username}</strong>
                            <div style={{marginLeft: 'auto'}}>
                                <a href="https://www.rokck.com" target="_blank" rel="noopener noreferrer" title="Dev by RokCK" style={{color: '#fff', textDecoration:'none'}}>
                                    <span className="dev-icon" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
                                            <rect x="3" y="4" width="18" height="11" rx="1" ry="1" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                                            <path d="M8 20h8" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
                                            <path d="M12 15v5" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
                                        </svg>
                                    </span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<NoteRok />, document.getElementById('root'));
    </script>
</body>
</html>
